services:
  - type: web
    name: feasable-whatsapp-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium
    healthCheckPath: /health
    autoDeploy: true
